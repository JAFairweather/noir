<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NOIR — Cases you unlock. Assets you burn.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<!-- Self-contained: nostr-tools is vendored (see lib/vendor/README.md).
     No CDN, no build step — the client runs from any static host or file server. -->
<script type="importmap">
{
  "imports": {
    "nostr-tools": "../lib/vendor/nostr-tools.mjs",
    "nostr-tools/pool": "../lib/vendor/nostr-tools-pool.mjs"
  }
}
</script>
<style>
  :root {
    --accent: #c39a56;
    --accent-dim: #6b5530;
    --ink: #0a0806;
    --era-font: 'Special Elite', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--accent);
    font-family: var(--era-font);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  /* full-bleed backdrop behind the drum, low luminance (spec §6) */
  #backdrop {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 30% 20%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%),
      radial-gradient(ellipse at 75% 85%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 55%),
      var(--ink);
  }
  header {
    position: relative; z-index: 2;
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 18px; font-size: 13px; color: var(--accent-dim);
    letter-spacing: 0.15em;
  }
  header .wordmark { color: var(--accent); font-size: 15px; letter-spacing: 0.5em; }
  #heat-lamp {
    --heat: 0;
    display: inline-block; margin-left: 1em;
    color: color-mix(in srgb, #d0442c calc(var(--heat) * 100%), var(--accent-dim));
  }

  main { position: relative; z-index: 1; flex: 1; display: flex; min-height: 0; }

  /* ------------------------------------------------ the Wheel (spec §6) */
  #stage {
    flex: 1; position: relative;
    perspective: 900px; perspective-origin: 50% 50%;
    overflow: hidden;
    /* fade the drum's wrap-away at the window edges */
    mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
  }
  #drum {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    /* pull the drum back by its radius (wheel.mjs RADIUS) so the focal line
       sits at z≈0 — curvature without magnification */
    transform: translateZ(-460px);
    display: grid; place-items: center;
  }
  .drum-line {
    position: absolute;
    width: min(72ch, 84%);
    text-align: left;
    font-size: 17px; line-height: 1.5;
    white-space: pre-wrap;
    color: var(--accent);
    backface-visibility: hidden;
    will-change: transform, opacity;
  }
  .drum-line.focal { color: #f4efe4; text-shadow: 0 0 14px color-mix(in srgb, var(--accent) 40%, transparent); }
  #flat {
    position: absolute; inset: 0; overflow-y: auto;
    padding: 24px clamp(16px, 12vw, 140px) 40vh;
    font-size: 16px; line-height: 1.6;
  }
  .flat-line { white-space: pre-wrap; }
  .hidden { display: none !important; }

  .player { color: #f4efe4; }
  .dim { opacity: 0.7; }
  .doc { color: color-mix(in srgb, var(--accent) 82%, white); }
  .doc-title { color: #f4efe4; letter-spacing: 0.2em; margin-top: 8px; }
  .grant-line { color: #9fd08a; letter-spacing: 0.08em; }
  .burn-line { color: #d0442c; letter-spacing: 0.12em; }
  .title-line { letter-spacing: 0.9em; color: #f4efe4; }

  /* ------------------------------------------------------- notebook */
  #notebook {
    width: 270px; flex: none; z-index: 2;
    border-left: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    padding: 14px; font-size: 13px; overflow-y: auto;
    background: color-mix(in srgb, var(--ink) 82%, black);
  }
  #notebook h2 { font-size: 12px; letter-spacing: 0.3em; color: var(--accent-dim); margin-bottom: 10px; }
  #notebook li {
    list-style: none; padding: 7px 6px; margin-bottom: 4px; cursor: pointer;
    border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
    display: flex; justify-content: space-between; gap: 6px;
  }
  #notebook li:hover { border-color: var(--accent); }
  .scope-stale { opacity: 0.45; cursor: default; text-decoration: line-through; }
  .scope-status { color: #d0442c; font-size: 11px; }
  #notebook .note { color: var(--accent-dim); font-size: 11px; margin-top: 14px; line-height: 1.5; }
  label.toggle { display: flex; gap: 6px; align-items: center; margin-top: 14px; color: var(--accent-dim); cursor: pointer; }

  /* --------------------------------------------------- command line */
  footer {
    position: relative; z-index: 2;
    padding: 12px 18px 16px;
    border-top: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    display: flex; align-items: center; gap: 10px;
  }
  footer .prompt { color: var(--accent); }
  #cmd {
    flex: 1; background: transparent; border: none; outline: none;
    color: #f4efe4; font-family: var(--era-font); font-size: 17px;
    caret-shape: block;
  }
  footer .hint { color: var(--accent-dim); font-size: 11px; letter-spacing: 0.1em; }
  /* blinking block cursor illusion when the input is empty */
  #cmd:placeholder-shown { caret-color: transparent; }
  #cmd:placeholder-shown + .block-cursor { display: inline-block; }
  .block-cursor {
    display: none; width: 10px; height: 20px; background: var(--accent);
    animation: blink 1.1s steps(1) infinite; position: absolute; left: 44px; bottom: 18px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* --------------------------------------------------------- cards */
  .card-overlay {
    position: fixed; inset: 0; z-index: 10;
    display: grid; place-items: center;
    background: rgba(0,0,0,0.75);
    opacity: 0; transition: opacity 0.3s;
  }
  .card-overlay.shown { opacity: 1; }
  .card {
    width: min(480px, 88vw); padding: 34px 30px;
    border: 2px solid #d0442c; background: var(--ink);
    text-align: center; transform: rotate(-1.5deg);
  }
  .card-stamp {
    display: inline-block; padding: 6px 18px; margin-bottom: 18px;
    border: 3px double #d0442c; color: #d0442c;
    font-size: 24px; letter-spacing: 0.35em;
    transform: rotate(2deg);
  }
  .card-title { color: #f4efe4; letter-spacing: 0.2em; margin-bottom: 12px; }
  .card-body { color: var(--accent); line-height: 1.6; margin-bottom: 16px; }
  .card-footer { color: var(--accent-dim); font-size: 12px; letter-spacing: 0.1em; }
  .card-hint { color: var(--accent-dim); font-size: 10px; margin-top: 18px; opacity: 0.6; }

  @media (max-width: 720px) {
    #notebook { position: fixed; right: 0; top: 42px; bottom: 58px; transform: translateX(100%); transition: transform 0.25s; }
    #notebook.open { transform: none; }
  }
</style>
</head>
<body>
  <div id="backdrop" aria-hidden="true"></div>
  <header>
    <span class="wordmark">NOIR</span>
    <span id="era-label"></span>
    <span>HEAT <span id="heat-value">0</span><span id="heat-lamp">●</span></span>
  </header>
  <main>
    <div id="stage" aria-label="Case transcript on the wheel">
      <div id="drum"></div>
    </div>
    <div id="flat" class="hidden" aria-label="Case transcript, flat mode"></div>
    <aside id="notebook">
      <h2>NOTEBOOK — GRANT INDEX</h2>
      <ul id="notebook-list"></ul>
      <label class="toggle"><input type="checkbox" id="flat-toggle"> flat mode (no motion)</label>
      <label class="toggle"><input type="checkbox" id="score-toggle"> score (original 19-TET)</label>
      <p class="note">Everything you hold is a kind-440 grant. Burned entries stay legible
      exactly as far as you already read — the key rotated past you, which is the point.</p>
    </aside>
  </main>
  <footer>
    <span class="prompt">&gt;</span>
    <input id="cmd" autocomplete="off" spellcheck="false" placeholder="" aria-label="Command line">
    <span class="block-cursor" aria-hidden="true"></span>
    <span class="hint">ENTER send · SPACE next beat · ↑↓ rotate</span>
  </footer>
  <script type="module" src="./game.mjs"></script>
</body>
</html>
