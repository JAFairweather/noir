<text x="240" y="188" font-size="12" fill="#c39a56" text-anchor="middle" letter-spacing="0" >granted → A, B</text><line x1="480" y1="100" x2="480" y2="360" stroke="#c39a56" stroke-width="1.4" stroke-dasharray="6 4"/><text x="480" y="116" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="0" >rotateScope</text><text x="480" y="378" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >new key K2 · republish · re-grant survivors: [A]</text><rect x="570" y="130" width="300" height="110" fill="#171106" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="720" y="156" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >SCOPE — generation 2</text><text x="720" y="180" font-size="12" fill="#c39a56" text-anchor="middle" letter-spacing="0" >encrypted under key K2</text>
<text x="720" y="198" font-size="12" fill="#c39a56" text-anchor="middle" letter-spacing="0" >granted → A</text><rect x="120" y="300" width="140" height="46" fill="#171106" stroke="#9fd08a" stroke-width="1.2"  rx="2"/><text x="190" y="328" font-size="12" fill="#9fd08a" text-anchor="middle" letter-spacing="0" >A — survivor</text><line x1="200" y1="300" x2="230" y2="242" stroke="#9fd08a" stroke-width="1.4"  marker-end="url(#arr-green)"/><line x1="260" y1="314" x2="650" y2="244" stroke="#9fd08a" stroke-width="1.4"  marker-end="url(#arr-green)"/><rect x="720" y="300" width="150" height="46" fill="#171106" stroke="#d64532" stroke-width="1.2"  rx="2"/><text x="795" y="328" font-size="12" fill="#d64532" text-anchor="middle" letter-spacing="0" >B — revoked</text><line x1="730" y1="300" x2="320" y2="244" stroke="#9fd08a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arr-green)"/><line x1="810" y1="300" x2="800" y2="244" stroke="#d64532" stroke-width="1.4"  marker-end="url(#arr-red)"/><text x="190" y="372" font-size="11" fill="#6b5530" text-anchor="middle" letter-spacing="0" >K1 still opens generation 1 —</text><text x="190" y="388" font-size="11" fill="#6b5530" text-anchor="middle" letter-spacing="0" >B keeps exactly what was already read</text><text x="795" y="372" font-size="11" fill="#d64532" text-anchor="middle" letter-spacing="0" >K1 fails the MAC on gen 2</text><text x="795" y="388" font-size="11" fill="#d64532" text-anchor="middle" letter-spacing="0" >→ NVOY_GRANT_REVOKED</text><text x="490" y="436" font-size="14" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >No ACL. No policy server. No token to expire.</text><text x="490" y="460" font-size="13" fill="#c39a56" text-anchor="middle" letter-spacing="0" >Access is whether your key opens the current ciphertext.</text><text x="24" y="502" font-size="11" fill="#6b5530" text-anchor="start" letter-spacing="2" >FIG. 3 — REVOCATION AS ROTATION</text>
