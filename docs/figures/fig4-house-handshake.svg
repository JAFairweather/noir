ry 120 s)</text><line x1="500" y1="300" x2="810" y2="300" stroke="#9fd08a" stroke-width="1.4"  marker-end="url(#arr-green)"/><text x="655" y="292" font-size="11" fill="#9fd08a" text-anchor="middle" letter-spacing="0" >the house + terms + the master’s npub</text><rect x="650" y="330" width="320" height="56" fill="#1d1508" stroke="#9fd08a" stroke-width="1.2"  rx="2"/><text x="810" y="352" font-size="10" fill="#9fd08a" text-anchor="middle" letter-spacing="0" >desk: “house held by grant from npub1gqg…</text>
