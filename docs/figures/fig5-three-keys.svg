<rect width="100%" height="100%" fill="#0d0a07"/>
<rect x="150" y="70" width="460" height="104" fill="#171106" stroke="#c39a56" stroke-width="1.4"  rx="2"/><text x="380" y="96" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="2" >MASTER KEY</text><text x="380" y="118" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >wallet / NIP-07 extension — never a server</text>
<text x="380" y="134" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >signs the house · the notes · every rotation</text>
<text x="380" y="150" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >owns the public kind-0 the till mirrors</text><rect x="90" y="250" width="580" height="104" fill="#171106" stroke="#c39a56" stroke-width="1.4"  rx="2"/><text x="380" y="276" font-size="13" fill="#c39a56" text-anchor="middle" letter-spacing="2" >TABLE ROOT — THE DIRECTOR’S NPUB</text><text x="380" y="298" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >its standing is only the grants it received</text>
<text x="380" y="314" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >certifies per-case keys in the hosted era</text>
<text x="380" y="330" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >fired by rotation, never by login</text><rect x="30" y="430" width="700" height="104" fill="#171106" stroke="#c39a56" stroke-width="1.4"  rx="2"/><text x="380" y="456" font-size="13" fill="#6b5530" text-anchor="middle" letter-spacing="2" >PER-CASE BURNER KEYS</text><text x="380" y="478" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >publish worlds · grant scopes to players</text>
<text x="380" y="494" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >rotate on burns · disposable by design</text><line x1="330" y1="174" x2="330" y2="250" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><text x="342" y="216" font-size="11" fill="#c39a56" text-anchor="start" letter-spacing="0" >grants the house (nvoy terms)</text><line x1="300" y1="354" x2="300" y2="430" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><text x="312" y="396" font-size="11" fill="#c39a56" text-anchor="start" letter-spacing="0" >certifies</text><line x1="560" y1="250" x2="560" y2="174" stroke="#d64532" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arr-red)"/><text x="572" y="216" font-size="11" fill="#d64532" text-anchor="start" letter-spacing="0" >no nsec ever crosses up</text><line x1="540" y1="430" x2="540" y2="354" stroke="#d64532" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arr-red)"/><rect x="760" y="250" width="190" height="90" fill="#171106" stroke="#c39a56" stroke-width="1.2" stroke-dasharray="4 3" rx="2"/><text x="855" y="276" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >master’s kind-0</text>
<text x="855" y="292" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >{ lud16: … }</text>
<text x="855" y="308" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >public — no grant</text><line x1="760" y1="295" x2="676" y2="295" stroke="#9fd08a" stroke-width="1.4"  marker-end="url(#arr-green)"/><text x="712" y="283" font-size="10" fill="#9fd08a" text-anchor="middle" letter-spacing="0" >till mirror</text><text x="490" y="560" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="0" >Compromise at any layer is answered by the layer above.</text><text x="24" y="602" font-size="11" fill="#6b5530" text-anchor="start" letter-spacing="2" >FIG. 5 — THE THREE KEYS OF THE TABLE</text>
</svg>