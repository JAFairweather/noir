<rect width="100%" height="100%" fill="#0d0a07"/>
<rect x="50" y="60" width="330" height="100" fill="#171106" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="215" y="86" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >RUNG 1 — ERA PACKS AS DATA</text><text x="215" y="108" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >a Lisbon published under the master’s key,</text>
<text x="215" y="123" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >granted to the Director via nvoy —</text>
<text x="215" y="138" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >new world, no new code</text><line x1="380" y1="110" x2="470" y2="290" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="50" y="220" width="330" height="100" fill="#171106" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="215" y="246" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >RUNG 2 — NEW ARCHETYPES</text><text x="215" y="268" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >accusation-as-chain · the alibi web —</text>
<text x="215" y="283" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >each brings its own fairness clauses</text>
<text x="215" y="298" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >to the Notary</text><line x1="380" y1="270" x2="470" y2="290" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="50" y="380" width="330" height="100" fill="#171106" stroke="#6b5530" stroke-width="1.2" stroke-dasharray="5 3" rx="2"/><text x="215" y="406" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >RUNG 3 — THE DIRECTOR AUTHORS</text><text x="215" y="428" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >the model proposes skeleton and flesh;</text>
<text x="215" y="443" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >the Notary replays, refuses, or seals</text>
<text x="215" y="458" font-size="10.5" fill="#c39a56" text-anchor="middle" letter-spacing="0" >(direction)</text><line x1="380" y1="430" x2="470" y2="290" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="470" y="130" width="26" height="330" fill="#c39a56" stroke="#c39a56" stroke-width="1.2"  rx="2"/><rect x="640" y="130" width="26" height="330" fill="#c39a56" stroke="#c39a56" stroke-width="1.2"  rx="2"/><rect x="470" y="96" width="196" height="34" fill="#c39a56" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="568" y="118" font-size="11" fill="#0d0a07" text-anchor="middle" letter-spacing="1" font-weight="bold">kind-0 COMMITMENT</text><text x="568" y="220" font-size="16" fill="#f4efe4" text-anchor="middle" letter-spacing="0" >THE</text>
<text x="568" y="244" font-size="16" fill="#f4efe4" text-anchor="middle" letter-spacing="0" >NOTARY</text><text x="568" y="300" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >structure</text>
<text x="568" y="318" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >fairness</text>
<text x="568" y="336" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >replay</text>
<text x="568" y="354" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >commitment</text><line x1="666" y1="295" x2="750" y2="295" stroke="#9fd08a" stroke-width="1.4"  marker-end="url(#arr-green)"/><rect x="750" y="240" width="200" height="110" fill="#171106" stroke="#9fd08a" stroke-width="1.2"  rx="2"/><text x="850" y="272" font-size="12" fill="#c39a56" text-anchor="middle" letter-spacing="0" >THE DEAL</text>
<text x="850" y="291" font-size="12" fill="#c39a56" text-anchor="middle" letter-spacing="0" >a table · a player</text>
<text x="850" y="310" font-size="12" fill="#c39a56" text-anchor="middle" letter-spacing="0" >a provably fair game</text><text x="500" y="520" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="0" >Every rung passes through the same door.</text><text x="24" y="562" font-size="11" fill="#6b5530" text-anchor="start" letter-spacing="2" >FIG. 8 — THE WORLD-BUILDER LADDER</text>
</svg>