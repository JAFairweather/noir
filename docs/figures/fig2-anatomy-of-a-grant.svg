<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" font-family="Courier New, Courier, monospace">
<defs><marker id="arr-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
     <path d="M0,0 L10,5 L0,10 z" fill="#c39a56"/></marker>
<marker id="arr-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
     <path d="M0,0 L10,5 L0,10 z" fill="#6b5530"/></marker>
<marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
     <path d="M0,0 L10,5 L0,10 z" fill="#d64532"/></marker>
<marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
     <path d="M0,0 L10,5 L0,10 z" fill="#9fd08a"/></marker>
<marker id="arr-cream" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
     <path d="M0,0 L10,5 L0,10 z" fill="#f4efe4"/></marker></defs>
<rect width="100%" height="100%" fill="#0d0a07"/>
<rect x="40" y="50" width="300" height="60" fill="#171106" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="190" y="75" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="2" >PUBLISHER</text><text x="190" y="95" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >master nsec — or a NIP-07 signer</text><rect x="40" y="140" width="140" height="52" fill="#1d1508" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="110" y="162" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >scope key</text>
<text x="110" y="177" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >random 32 B</text><text x="190" y="172" font-size="18" fill="#6b5530" text-anchor="middle" letter-spacing="0" >⊕</text><rect x="200" y="140" width="140" height="52" fill="#1d1508" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="270" y="162" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >payload</text>
<text x="270" y="177" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >(JSON)</text><line x1="190" y1="192" x2="190" y2="240" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="40" y="240" width="300" height="118" fill="#171106" stroke="#c39a56" stroke-width="1.6"  rx="2"/><text x="190" y="264" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >kind 30440 — SCOPED DATA SET</text><text x="58" y="288" font-size="12" fill="#c39a56" text-anchor="start" letter-spacing="0" >d  = opaque scope id</text>
<text x="58" y="305" font-size="12" fill="#c39a56" text-anchor="start" letter-spacing="0" >v  = generation</text>
<text x="58" y="322" font-size="12" fill="#c39a56" text-anchor="start" letter-spacing="0" >content = NIP-44 v2 ciphertext</text>
<text x="58" y="339" font-size="12" fill="#c39a56" text-anchor="start" letter-spacing="0" >          under the scope key</text><line x1="340" y1="300" x2="430" y2="300" stroke="#6b5530" stroke-width="1.4"  marker-end="url(#arr-dim)"/><text x="385" y="290" font-size="10" fill="#6b5530" text-anchor="middle" letter-spacing="0" >publish</text><rect x="560" y="50" width="380" height="310" fill="#171106" stroke="#c39a56" stroke-width="1.6"  rx="2"/><text x="750" y="74" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >kind 1059 — GIFT WRAP</text><text x="750" y="92" font-size="10" fill="#6b5530" text-anchor="middle" letter-spacing="0" >signed by an EPHEMERAL key · p = grantee</text>
<text x="750" y="106" font-size="10" fill="#6b5530" text-anchor="middle" letter-spacing="0" >created_at fuzzed up to 2 days</text><rect x="580" y="128" width="340" height="212" fill="#1d1508" stroke="#c39a56" stroke-width="1.2" stroke-dasharray="5 3" rx="2"/><text x="750" y="150" font-size="12" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >kind 13 — SEAL</text><text x="750" y="166" font-size="10" fill="#6b5530" text-anchor="middle" letter-spacing="0" >signed by the PUBLISHER · nip44 to grantee</text><rect x="600" y="182" width="300" height="140" fill="#171106" stroke="#9fd08a" stroke-width="1.2"  rx="2"/><text x="750" y="204" font-size="11" fill="#f4efe4" text-anchor="middle" letter-spacing="0" >kind 440 — GRANT RUMOR (unsigned)</text><text x="616" y="226" font-size="11" fill="#c39a56" text-anchor="start" letter-spacing="0" >scope_key (b64) · scope_name</text>
<text x="616" y="243" font-size="11" fill="#c39a56" text-anchor="start" letter-spacing="0" >a = 30440:&lt;publisher&gt;:&lt;scope id&gt;</text>
<text x="616" y="260" font-size="11" fill="#c39a56" text-anchor="start" letter-spacing="0" >v = generation pinned</text>
<text x="616" y="277" font-size="11" fill="#c39a56" text-anchor="start" letter-spacing="0" >nvoy { purpose, expires_at, … }</text><line x1="340" y1="80" x2="560" y2="80" stroke="#6b5530" stroke-width="1.4"  marker-end="url(#arr-dim)"/><text x="450" y="70" font-size="10" fill="#6b5530" text-anchor="middle" letter-spacing="0" >grant (wrap → relay)</text><rect x="430" y="270" width="100" height="60" fill="#171106" stroke="#6b5530" stroke-width="1.2" stroke-dasharray="4 3" rx="2"/><text x="480" y="296" font-size="11" fill="#6b5530" text-anchor="middle" letter-spacing="2" >RELAYS</text><text x="480" y="312" font-size="9" fill="#6b5530" text-anchor="middle" letter-spacing="0" >ciphertext</text><line x1="750" y1="360" x2="750" y2="410" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="40" y="410" width="900" height="150" fill="#171106" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="490" y="436" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="3" >GRANTEE</text><rect x="70" y="456" width="250" height="74" fill="#1d1508" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="195" y="484" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >unwrap</text><text x="195" y="506" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >1059 → 13 → 440</text><line x1="320" y1="493" x2="370" y2="493" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="370" y="456" width="250" height="74" fill="#1d1508" stroke="#c39a56" stroke-width="1.2"  rx="2"/><text x="495" y="484" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >dereference</text><text x="495" y="506" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >fetch 30440 by (publisher, d)</text><line x1="620" y1="493" x2="670" y2="493" stroke="#c39a56" stroke-width="1.4"  marker-end="url(#arr-gold)"/><rect x="670" y="456" width="250" height="74" fill="#1d1508" stroke="#9fd08a" stroke-width="1.2"  rx="2"/><text x="795" y="484" font-size="13" fill="#f4efe4" text-anchor="middle" letter-spacing="1" >decrypt</text><text x="795" y="506" font-size="11" fill="#c39a56" text-anchor="middle" letter-spacing="0" >the CURRENT generation</text><text x="490" y="550" font-size="11" fill="#6b5530" text-anchor="middle" letter-spacing="0" >a newer generation than the grant pins → stale: revoked, or rotated past you</text><text x="24" y="622" font-size="11" fill="#6b5530" text-anchor="start" letter-spacing="2" >FIG. 2 — ANATOMY OF A GRANT</text>
</svg>