# The Noir Director + a shared Caddy front door, for one Hostinger VPS.
#
# Caddy terminates HTTPS for EVERYTHING on nave.pub (auto Let's Encrypt),
# and reverse-proxies each subdomain to its container. Adding your Claude
# bot or the relay later is three lines in ./Caddyfile — one front door,
# many services. This is the whole point of consolidating on one box.
#
#   cd deploy && cp .env.example .env   # then fill it in
#   docker compose up -d --build
#   docker compose logs -f director

services:
  director:
    build:
      context: ..                 # repo root, so the Dockerfile's COPYs resolve
      dockerfile: deploy/Dockerfile
    image: noir-director:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - NOIR_GM_PORT=8787
    expose:
      - "8787"                    # internal only; Caddy is the public face
    networks: [nave]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Luke — the delegated-agent card + the nostr-signed cockpit gate.
  # Its own repo (jafairweather/luke), synced by sites.sh into sites/luke
  # and built from there (standalone image, just nostr-tools). Its env lives
  # at ../luke/.env on the box (gitignored, never in the repo). See the
  # runbook in the luke repo's LUKE.md.
  luke:
    build:
      context: ./sites/luke
    image: luke:latest
    restart: unless-stopped
    env_file:
      - path: ../luke/.env      # optional — a missing file must never break
        required: false         # the main stack (director/caddy/static)
    environment:
      - LUKE_PORT=8790
    expose:
      - "8790"
    networks: [nave]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8790/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"                   # ACME http-01 challenge + http→https redirect
      - "443:443"
    env_file: .env                # Caddy reads ACME_EMAIL from here
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # certificates persist here — do not delete
      - caddy_config:/config
      # --- Static sites, served straight off the box (read-only) ---------
      # ONLY public dirs are mounted. deploy/ (which holds .env with your
      # ANTHROPIC_API_KEY + director nsec) is deliberately NOT here — the
      # secrets never enter the web-serving container.
      - ../client:/srv/site/client:ro        # the game client → noir.nave.pub
      - ../lib:/srv/site/lib:ro              # sibling modules the client imports
      - ../gm:/srv/site/gm:ro
      - ../shared:/srv/site/shared:ro
      - ../eras:/srv/site/eras:ro
      - ../sw.js:/srv/site/sw.js:ro          # the service-worker kill switch
      # Each app's site (synced by deploy/sites.sh) → served at <app>.nave.pub
      - ./sites:/srv/apps:ro
    networks: [nave]
    # Lets Caddy reach services published on the host (e.g. Luke/OpenClaw
    # on host port 57419) via host.docker.internal. Harmless until used.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [director, luke]

networks:
  nave:
    name: nave

volumes:
  caddy_data:
  caddy_config:
