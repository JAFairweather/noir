<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NOIR — moved to https://noir.nave.pub</title>
<link rel="canonical" href="https://noir.nave.pub/">
<meta http-equiv="refresh" content="0; url=https://noir.nave.pub/">
<meta name="robots" content="noindex">
<style>
  html,body{height:100%;margin:0}
  body{background:#0a0806;color:#c39a56;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    display:flex;align-items:center;justify-content:center;text-align:center;letter-spacing:.06em}
  a{color:#e2c079}
  .box{max-width:34ch;line-height:1.7;font-size:14px}
  .wm{letter-spacing:.5em;color:#e2c079;font-size:18px;margin-bottom:14px}
</style>
</head>
<body>
  <div class="box">
    <div class="wm">NOIR</div>
    This room moved to its own address.<br>
    Taking you to <a href="https://noir.nave.pub/">https://noir.nave.pub</a>…
  </div>
  <script>
    (function () {
      var TARGET = 'https://noir.nave.pub/';
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (rs) { rs.forEach(function (r) { r.unregister(); }); }).catch(function(){});
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function(){});
        }
      } catch (e) {}
      location.replace(TARGET);
    })();
  </script>
  <noscript><a href="https://noir.nave.pub/">Continue to https://noir.nave.pub</a></noscript>
</body>
</html>
